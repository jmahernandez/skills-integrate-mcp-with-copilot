<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign Up - Mergington High</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header>
      <h1>Mergington High School</h1>
      <h2>Create a Student Account</h2>
    </header>

    <main>
      <section id="signup-container">
        <h3>Register a new account</h3>
        <form id="signup-form">
          <div class="form-group">
            <label for="name">Full Name</label>
            <input type="text" id="name" name="name" required placeholder="Your full name" />
          </div>
          <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" required placeholder="your-email@mergington.edu" />
          </div>
          <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" required placeholder="Choose a password" />
          </div>
          <div class="form-group">
            <label for="branch">Branch</label>
            <select id="branch" name="branch" required>
              <option value="">-- Select a branch --</option>
              <option value="COE">COE</option>
              <option value="CED">CED</option>
              <option value="MSM">MSM</option>
              <option value="MDM">MDM</option>
              <option value="MFD">MFD</option>
              <option value="MPD">MPD</option>
              <option value="ESD">ESD</option>
              <option value="EDM">EDM</option>
              <option value="EVD">EVD</option>
            </select>
          </div>
          <button type="submit">Sign Up</button>
        </form>

        <p class="small-text">
          Already have an account? <a href="index.html">Login here</a>
        </p>

        <div id="message" class="hidden"></div>
      </section>
    </main>

    <footer>
      <p>&copy; 2026 Mergington High School</p>
    </footer>

    <script src="auth.js"></script>
  </body>
</html>
